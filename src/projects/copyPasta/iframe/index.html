<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CopyPasta Web</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="web-app">
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>CopyPasta</h1>
          <p id="syncStatus" class="sync-status">Loading synced note...</p>
        </div>
        <button id="clearButton" class="icon-button danger" type="button" title="Clear note" aria-label="Clear note">
          <span aria-hidden="true">&times;</span>
        </button>
      </header>

      <section class="toolbar" aria-label="Editor tools">
        <button class="tool-button" type="button" data-command="bold" title="Bold" aria-label="Bold">
          <strong>B</strong>
        </button>
        <button class="tool-button" type="button" data-command="italic" title="Italic" aria-label="Italic">
          <em>I</em>
        </button>
        <button class="tool-button" type="button" data-command="underline" title="Underline" aria-label="Underline">
          <span class="underline">U</span>
        </button>
        <button class="tool-button" type="button" data-command="insertUnorderedList" title="Bulleted list" aria-label="Bulleted list">
          <span aria-hidden="true">&bull;</span>
        </button>
        <button class="tool-button" type="button" data-command="insertOrderedList" title="Numbered list" aria-label="Numbered list">
          <span aria-hidden="true">1.</span>
        </button>
        <button class="tool-button" type="button" data-command="createLink" title="Link" aria-label="Link">
          <span aria-hidden="true">Link</span>
        </button>
        <button id="copyAllButton" class="tool-button" type="button" title="Copy all" aria-label="Copy all">
          <span aria-hidden="true">Copy</span>
        </button>
        <label class="tool-button file-tool" title="Attach file" aria-label="Attach file">
          <span aria-hidden="true">+</span>
          <input id="fileInput" type="file" multiple>
        </label>
      </section>

      <div
        id="editor"
        class="editor"
        contenteditable="true"
        role="textbox"
        aria-multiline="true"
        spellcheck="true"
        data-placeholder="Paste text, screenshots, images, or small files here..."
      ></div>

      <footer class="footer">
        <span id="quotaStatus">0 KB synced</span>
        <span data-storage-label>Extension sync</span>
      </footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
